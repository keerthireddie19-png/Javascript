<!DOCTYPE html>
<html>
    <head>
        <title>Rock-Paper-Scissors</title>
        
</style>
</head>
    <body>
        <p>Rock Paper Scissors</p>
        <button onclick="
         playgame('rock');
         ">Rock</button>
        
        <button onclick="
          playgame('paper');
        ">Paper</button>
        <button onclick="
          playgame('scissors')
        ">Scissors</button>

        <button onclick="
          score.wins = 0;
          score.losses = 0;
          score.ties = 0;
        ">Reset Score</button>
       
        <script>
          const score = {
            wins: 0,
            losses: 0,
            ties: 0,
          };


        function playgame(playermove) {
            const computermove = pickcomputermove();

            let result = '';

            if (playermove === 'scissors') {
                if (computermove === 'rock') {
                    result = 'you lose';
                } else if (computermove === 'paper') {
                    result = 'you win';
                } else if (computermove === 'scissors') {
                    result = 'Tie';
                }
            } else if (playmove === 'paper') {
                if (computermove === 'rock') {
                    result = 'you win';
                } else if (computermove === 'paper') {
                    result = 'Tie';
                } else if (computermove === 'scissors') {
                    result = 'you lose';
                }
            } else if (playmove === 'scissors') {
                if (computermove === 'rock') {
                    result = 'Tie';
                } else if (computermove === 'paper') {
                    result = 'you lose';
                } else if (computermove === 'scissors') {
                    result = 'you win';
                }
            }

            if (result === 'you win') {
                score.wins = score.wins += 1;
            } else if (result === 'you lose') {
                score.loses += 1;
            } else if (result === 'Tie') {
                score.Tie += 1;
            }
            
            alert(`you picked ${playermove}. computer picked ${computermove}. ${result} wins: ${score.wins}, losses: ${score.losses}, Ties: ${score.ties}`);
        }
         
        function pickedcomputermove() {
            const randomNumber = Math.random();

            let computermove = '';

            if (randomNumber >= 0 && randomNumber < 1/ 3) {
                computermove = 'rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computermove = 'paper';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computermove = 'scissors';
            }
        }
       </script>
    </body>
</html>
